<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0f1a"/>
      <stop offset="100%" style="stop-color:#12101e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7b61ff"/>
      <stop offset="100%" style="stop-color:#00d2ff"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7b61ff;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#00d2ff;stop-opacity:0.0"/>
    </linearGradient>
    <filter id="blur1">
      <feGaussianBlur stdDeviation="60"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Aurora blobs -->
  <ellipse cx="200" cy="200" rx="300" ry="200" fill="#7b61ff" opacity="0.12" filter="url(#blur1)"/>
  <ellipse cx="1000" cy="430" rx="280" ry="180" fill="#00d2ff" opacity="0.10" filter="url(#blur1)"/>
  <ellipse cx="600" cy="100" rx="200" ry="120" fill="#b478ff" opacity="0.08" filter="url(#blur1)"/>

  <!-- Top accent bar -->
  <rect x="60" y="60" width="120" height="4" rx="2" fill="url(#accent)"/>

  <!-- Lock icon -->
  <g transform="translate(60, 90)">
    <rect x="8" y="20" width="44" height="32" rx="6" fill="none" stroke="url(#accent)" stroke-width="2.5"/>
    <path d="M18 20 V14 A12 12 0 0 1 42 14 V20" fill="none" stroke="url(#accent)" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="30" cy="36" r="4" fill="url(#accent)"/>
    <rect x="28" y="38" width="4" height="6" rx="2" fill="url(#accent)"/>
  </g>

  <!-- Main heading -->
  <text x="60" y="230" font-family="system-ui,-apple-system,sans-serif" font-size="72" font-weight="800" fill="white" letter-spacing="-2">PassKit.in</text>

  <!-- Gradient underline -->
  <rect x="60" y="245" width="480" height="4" rx="2" fill="url(#accent)"/>

  <!-- Tagline -->
  <text x="60" y="310" font-family="system-ui,-apple-system,sans-serif" font-size="28" fill="#a0a8c0" letter-spacing="0">Free Password Security Suite</text>

  <!-- Sub tagline -->
  <text x="60" y="355" font-family="system-ui,-apple-system,sans-serif" font-size="20" fill="#6b7494">10 tools · 100% browser-based · crypto.getRandomValues()</text>

  <!-- Tool pills -->
  <g transform="translate(60, 395)">
    <!-- Pill 1 -->
    <rect x="0" y="0" width="180" height="36" rx="18" fill="#7b61ff" opacity="0.2"/>
    <rect x="0" y="0" width="180" height="36" rx="18" fill="none" stroke="#7b61ff" stroke-width="1" opacity="0.4"/>
    <text x="90" y="23" font-family="system-ui,sans-serif" font-size="14" fill="#c4b8ff" text-anchor="middle">🔑 Password Generator</text>
    <!-- Pill 2 -->
    <rect x="190" y="0" width="170" height="36" rx="18" fill="#00d2ff" opacity="0.1"/>
    <rect x="190" y="0" width="170" height="36" rx="18" fill="none" stroke="#00d2ff" stroke-width="1" opacity="0.3"/>
    <text x="275" y="23" font-family="system-ui,sans-serif" font-size="14" fill="#99eeff" text-anchor="middle">🛡️ Breach Checker</text>
    <!-- Pill 3 -->
    <rect x="370" y="0" width="190" height="36" rx="18" fill="#b478ff" opacity="0.12"/>
    <rect x="370" y="0" width="190" height="36" rx="18" fill="none" stroke="#b478ff" stroke-width="1" opacity="0.3"/>
    <text x="465" y="23" font-family="system-ui,sans-serif" font-size="14" fill="#ddb8ff" text-anchor="middle">📊 Strength Tester</text>
    <!-- Pill 4 -->
    <rect x="570" y="0" width="175" height="36" rx="18" fill="#63b3ff" opacity="0.1"/>
    <rect x="570" y="0" width="175" height="36" rx="18" fill="none" stroke="#63b3ff" stroke-width="1" opacity="0.3"/>
    <text x="657" y="23" font-family="system-ui,sans-serif" font-size="14" fill="#aad4ff" text-anchor="middle">🔐 API Key Gen</text>
  </g>

  <!-- Right side: stats card -->
  <rect x="780" y="140" width="360" height="330" rx="20" fill="white" opacity="0.04"/>
  <rect x="780" y="140" width="360" height="330" rx="20" fill="none" stroke="white" stroke-width="1" opacity="0.08"/>

  <text x="960" y="205" font-family="system-ui,sans-serif" font-size="14" fill="#6b7494" text-anchor="middle" letter-spacing="2">SECURITY STATS</text>

  <text x="960" y="270" font-family="system-ui,sans-serif" font-size="52" font-weight="800" fill="white" text-anchor="middle">10</text>
  <text x="960" y="298" font-family="system-ui,sans-serif" font-size="14" fill="#7b61ff" text-anchor="middle">Free Tools</text>

  <rect x="860" y="315" width="200" height="1" fill="white" opacity="0.08"/>

  <text x="870" y="360" font-family="system-ui,sans-serif" font-size="36" font-weight="700" fill="white">0</text>
  <text x="870" y="380" font-family="system-ui,sans-serif" font-size="12" fill="#00d2ff">Ads</text>

  <text x="1000" y="360" font-family="system-ui,sans-serif" font-size="36" font-weight="700" fill="white">0</text>
  <text x="1000" y="380" font-family="system-ui,sans-serif" font-size="12" fill="#00d2ff">Servers</text>

  <text x="870" y="430" font-family="system-ui,sans-serif" font-size="12" fill="#6b7494">passkit.in</text>
  <text x="1070" y="430" font-family="system-ui,sans-serif" font-size="12" fill="#6b7494" text-anchor="end">Free Forever</text>

  <!-- Bottom domain -->
  <text x="60" y="580" font-family="system-ui,sans-serif" font-size="16" fill="#3d4468">passkit.in — No tracking. No server. No ads.</text>
</svg>
